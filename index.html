<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Inventario</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>📦 Sistema de Inventario</h1>
  </header>

  <main>
    <!-- Formulario -->
    <section id="seccion-formulario">
        <h2>Agregar / Editar Producto</h2>
<div class="formulario">
<input type="hidden" id="productoIndex" value="-1" />
<div class="form-grid">
  <div class="campo">
    <label>Nombre del producto</label>
    <input type="text" id="nombre" placeholder="Ej: Arroz 1kg" />
  </div>
  <div class="campo">
    <label>Cantidad</label>
    <input type="number" id="cantidad" placeholder="Ej: 50" min="0" />
  </div>
  <div class="campo">
    <label>Precio (COP)</label>
    <input type="number" id="precio" placeholder="Ej: 3500" min="0" />
  </div>
</div>
<div class="form-btns">
  <button class="btn btn-guardar" onclick="guardarProducto()">💾 Guardar</button>
  <button class="btn btn-limpiar" onclick="limpiarFormulario()">🔄 Limpiar</button>
</div>
</div>
    </section>

    <!-- Buscador -->
    <section id="seccion-busqueda">
    <input type="text" id="buscador"
  placeholder="🔍 Buscar producto..."
  oninput="filtrarProductos()" />
    </section>

    <!-- Tabla -->
    <section id="seccion-tabla">
      <h2>Inventario de Productos</h2>
<table id="tablaInventario">
  <thead>
    <tr>
      <th>#</th>
      <th>Nombre</th>
      <th>Cantidad</th>
      <th>Precio</th>
      <th>Total</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="cuerpoTabla">
    <!-- Las filas se generan con JS -->
  </tbody>
</table>
<p id="totalGeneral"></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
